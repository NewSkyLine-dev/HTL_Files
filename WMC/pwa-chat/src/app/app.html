<div class="chat-container">
  <h1>PWA Chat</h1>

  <div class="status-bar" [class.success]="registrationStatus.includes('erfolgreich')" [class.error]="registrationStatus.includes('Fehler') || registrationStatus.includes('fehlgeschlagen')">
    {{ registrationStatus || 'Bereit' }}
  </div>

  <div class="send-section">
    <input [(ngModel)]="message" placeholder="Nachricht eingeben..." (keyup.enter)="send()">
    <button (click)="send()" [disabled]="!message.trim()">Senden</button>
  </div>

  <div *ngIf="sendStatus" class="send-status">{{ sendStatus }}</div>
</div>
